<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Health Buddy | SARS_RECOMMENDER</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  
  <!-- Language Support -->
  <script>window.changeLanguage = window.changeLanguage || function(lang) { localStorage.setItem('selectedLanguage', lang); const cv = '/en/' + lang; document.cookie = 'googtrans=' + cv + '; path=/'; window.location.hash = "#googtrans(en|" + lang + ")"; location.reload(); };</script><script src="{{ url_for('static', filename='language.js') }}"></script><script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
  <style>
    /* Hide Google Translate Bar */
    .goog-te-banner-frame.skiptranslate, .goog-te-gadget-icon { display: none !important; }
    body { top: 0px !important; }
    .goog-te-combo { display: none !important; }
  </style>
  <style>
    /* ══════════════════════════════════════════
       1.  THEME TOKENS
    ══════════════════════════════════════════ */
    [data-theme="dark"] {
      --bg: #080c14;
      --panel: #111827;
      --sidebar-bg: rgba(13, 19, 32, 0.97);
      --topbar-bg: rgba(8, 12, 20, 0.85);
      --border: rgba(99, 179, 237, 0.12);
      --text: #e2e8f0;
      --text2: #94a3b8;
      --muted: #64748b;
      --inp: rgba(255, 255, 255, 0.05);
      --hover: rgba(56, 189, 248, 0.08);
      --msg-user: #38bdf8;
      --msg-bot: #1e293b;
    }

    [data-theme="light"] {
      --bg: #f0f4f8;
      --panel: #ffffff;
      --sidebar-bg: rgba(255, 255, 255, 0.98);
      --topbar-bg: rgba(240, 244, 248, 0.92);
      --border: rgba(56, 189, 248, 0.2);
      --text: #1e293b;
      --text2: #475569;
      --muted: #94a3b8;
      --inp: rgba(0, 0, 0, 0.04);
      --hover: rgba(56, 189, 248, 0.08);
      --msg-user: #38bdf8;
      --msg-bot: #e2e8f0;
    }

    :root {
      --accent: #38bdf8;
      --accent2: #818cf8;
      --sidebar-w: 242px;
    }

    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
    }

    /* ══════════════════════════════════════════
       SIDEBAR (Standardized)
    ══════════════════════════════════════════ */
    .sidebar {
      width: var(--sidebar-w);
      height: 100vh;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 24px 0;
      backdrop-filter: blur(20px);
      transition: transform 0.3s ease;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 20px 22px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 14px;
    }

    .logo-icon {
      width: 34px;
      height: 34px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      color: #fff;
    }

    .logo-text {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 13px;
      color: var(--accent);
      letter-spacing: .08em;
      text-transform: uppercase;
      line-height: 1.3;
    }

    .nav-links {
      list-style: none;
      flex: 1;
      padding: 0 10px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      overflow-y: auto;
    }

    .nav-links li>a {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 10px 12px;
      border-radius: 10px;
      color: var(--muted);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
    }

    .nav-links li.active>a {
      color: var(--accent);
      background: rgba(56, 189, 248, 0.1);
    }

    .nav-links li>a:hover {
      background: var(--hover);
      color: var(--text);
    }

    /* ══════════════════════════════════════════
       CHAT AREA
    ══════════════════════════════════════════ */
    .chat-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      position: relative;
    }

    .chat-header {
      padding: 20px 30px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 15px;
      background: var(--topbar-bg);
      backdrop-filter: blur(20px);
    }

    .bot-status {
      width: 10px;
      height: 10px;
      background: #34d399;
      border-radius: 50%;
      box-shadow: 0 0 10px rgba(52, 211, 153, 0.5);
    }

    .chat-header h2 {
      font-family: 'Syne', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
    }

    .messages-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 30px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .msg {
      max-width: 70%;
      padding: 14px 18px;
      border-radius: 18px;
      font-size: 0.95rem;
      line-height: 1.6;
      position: relative;
      animation: msgIn 0.3s ease;
    }

    @keyframes msgIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .msg.bot {
      align-self: flex-start;
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text);
      border-bottom-left-radius: 4px;
    }

    .msg.user {
      align-self: flex-end;
      background: var(--msg-user);
      color: #fff;
      border-bottom-right-radius: 4px;
      box-shadow: 0 4px 15px rgba(56, 189, 248, 0.2);
    }

    .input-area {
      padding: 20px 30px;
      border-top: 1px solid var(--border);
      background: var(--bg);
      display: flex;
      gap: 15px;
      align-items: center;
    }

    .input-box {
      flex: 1;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      display: flex;
      align-items: center;
      padding: 5px 15px;
    }

    .input-box input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      padding: 12px 0;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
    }

    .send-btn {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: var(--accent);
      color: white;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      transition: transform 0.2s;
    }

    .send-btn:hover {
      transform: scale(1.05);
      background: var(--accent2);
    }

    .typing {
      display: none;
      align-items: center;
      gap: 5px;
      padding: 10px;
      color: var(--muted);
      font-size: 0.8rem;
    }

    .dot {
      width: 4px;
      height: 4px;
      background: var(--muted);
      border-radius: 50%;
      animation: blink 1.4s infinite;
    }

    .dot:nth-child(2) {
      animation-delay: 0.2s;
    }

    .dot:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 0.3;
      }

      50% {
        opacity: 1;
      }
    }

    @media(max-width: 768px) {
      .sidebar {
        display: none;
      }
    }
  </style>
</head>

<body>
<div id="google_translate_element"></div>

  <aside class="sidebar">
    <div class="logo">
      <div class="logo-icon"><i class="fa-solid fa-capsules"></i></div>
      <div class="logo-text">SARS</div>
    </div>
    <ul class="nav-links">
      <li><a href="{{ url_for('dashboard') }}"><i class="fa-solid fa-chart-line"></i> Dashboard</a></li>
      <li><a href="{{ url_for('disease_predictor') }}"><i class="fa-solid fa-stethoscope"></i> Predictors</a></li>
      <li><a href="{{ url_for('medicine') }}"><i class="fa-solid fa-pills"></i> Medicine</a></li>
      <li class="active"><a href="{{ url_for('chatbot') }}"><i class="fa-solid fa-robot"></i> AI Health Buddy</a></li>
      <li><a href="{{ url_for('settings') }}"><i class="fa-solid fa-gear"></i> Settings</a></li>
    </ul>
  </aside>

  <main class="chat-container">
    <header class="chat-header">
      <div class="bot-status"></div>
      <div>
        <h2>AI Health Buddy</h2>
        <p style="font-size: 0.75rem; color: var(--muted);">Available to help 24/7</p>
      </div>
      <button id="themeBtn"
        style="margin-left: auto; background: none; border: none; color: var(--text); cursor: pointer; font-size: 1.2rem;">
        <i class="fa-solid fa-moon"></i>
      </button>
    </header>

    <div class="messages-wrap" id="chatBox">
      <div class="msg bot">
        Hello! I'm your AI Medical Assistant. How can I assist you today? Feel free to ask about symptoms, medications,
        or health tips.
      </div>
    </div>

    <div class="typing" id="typing">
      AI Buddy is thinking <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>

    <div class="input-area">
      <div class="input-box">
        <input type="text" id="userInput" placeholder="Type your health concern here..." autocomplete="off">
      </div>
      <button class="send-btn" id="sendBtn"><i class="fa-solid fa-paper-plane"></i></button>
    </div>
  </main>

  <script>
    const chatBox = document.getElementById('chatBox');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const typing = document.getElementById('typing');
    const themeBtn = document.getElementById('themeBtn');

    // Theme Logic
    (function () {
      var t = localStorage.getItem('sars-theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
      themeBtn.innerHTML = t === 'dark' ? '<i class="fa-solid fa-sun"></i>' : '<i class="fa-solid fa-moon"></i>';
    })();

    themeBtn.addEventListener('click', () => {
      let current = document.documentElement.getAttribute('data-theme');
      let next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('sars-theme', next);
      themeBtn.innerHTML = next === 'dark' ? '<i class="fa-solid fa-sun"></i>' : '<i class="fa-solid fa-moon"></i>';
    });

    async function sendMessage() {
      const text = userInput.value.trim();
      if (!text) return;

      // Add user message
      const userDiv = document.createElement('div');
      userDiv.className = 'msg user';
      userDiv.textContent = text;
      chatBox.appendChild(userDiv);
      userInput.value = '';
      chatBox.scrollTop = chatBox.scrollHeight;

      // Show typing
      typing.style.display = 'flex';

      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text })
        });
        const data = await response.json();

        setTimeout(() => {
          typing.style.display = 'none';
          const botDiv = document.createElement('div');
          botDiv.className = 'msg bot';
          botDiv.textContent = data.response;
          chatBox.appendChild(botDiv);
          chatBox.scrollTop = chatBox.scrollHeight;
        }, 600);

      } catch (error) {
        typing.style.display = 'none';
        console.error(error);
      }
    }

    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
  </script>

</body>

</html>
