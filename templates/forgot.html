<!DOCTYPE html>
<html>
<head>
    <!-- Google Translate -->
    <script>window.changeLanguage = window.changeLanguage || function(l) { localStorage.setItem("selectedLanguage", l); document.cookie = "googtrans=/en/"+l+"; path=/"; window.location.hash = "#googtrans(en|" + l + ")"; location.reload(); };</script>
    <script src="{{ url_for("static", filename="language.js") }}"></script>
    <script type="text/javascript" src="https://translate.google.com/translate_a/element.js"></script>
    <div id="google_translate_element" style="position:fixed;bottom:-100px;opacity:0;"></div>
    <title>Forgot Password</title>
    <style>
        body {
            font-family: Arial;
            background: #f857a6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .box {
            background: white;
            padding: 25px;
            width: 300px;
            border-radius: 10px;
            text-align: center;
        }
        input, button {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Forgot Password</h2>
    <form method="post">
        <input type="email" name="email" placeholder="Enter Email" required>
        <button type="submit">Reset Password</button>
    </form>
</div>

</body>
</html>
