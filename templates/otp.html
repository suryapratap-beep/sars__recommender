<!DOCTYPE html>
<html>
<head>
    <!-- Google Translate -->
    <script>window.changeLanguage = window.changeLanguage || function(l) { localStorage.setItem("selectedLanguage", l); document.cookie = "googtrans=/en/"+l+"; path=/"; window.location.hash = "#googtrans(en|" + l + ")"; location.reload(); };</script>
    <script src="{{ url_for("static", filename="language.js") }}"></script>
    <script type="text/javascript" src="https://translate.google.com/translate_a/element.js"></script>
    <div id="google_translate_element" style="position:fixed;bottom:-100px;opacity:0;"></div>
    <title>OTP Verification</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #11998e, #e6ef38);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: white;
            padding: 30px;
            width: 300px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.2);
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 15px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #11998e;
            color: white;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Verify OTP</h2>
    
    {% if error %}
        <p style="color: #b30000; font-size: 14px; margin-bottom: 10px;">{{ error }}</p>
    {% endif %}
    {% if success %}
        <p style="color: #10b981; font-size: 14px; margin-bottom: 10px;">{{ success }}</p>
    {% endif %}

    <form method="post" action="/otp">
        <input type="text" name="otp" placeholder="Enter OTP" required>
        <button type="submit">Verify</button>
    </form>

    {% if expired %}
    <form method="post" action="/resend_otp" style="margin-top: 15px;">
        <button type="submit" style="background: #eab308; color: white;">Resend Code</button>
    </form>
    {% endif %}
</div>

</body>
</html>
