<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Choose Your Plan | SARS_RECOMMENDER</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#080c14;--surface:#0f1521;--surface2:#151d2e;--border:rgba(99,179,237,0.13);--accent:#38bdf8;--accent2:#818cf8;--accent3:#34d399;--text:#e2e8f0;--muted:#64748b;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;overflow-x:hidden;}
    body::before{content:'';position:fixed;top:-120px;right:-120px;width:400px;height:400px;background:radial-gradient(circle,rgba(56,189,248,0.06) 0%,transparent 70%);border-radius:50%;pointer-events:none;}
    body::after{content:'';position:fixed;bottom:-100px;left:-100px;width:350px;height:350px;background:radial-gradient(circle,rgba(129,140,248,0.05) 0%,transparent 70%);border-radius:50%;pointer-events:none;}
    .skip-btn{position:fixed;top:20px;right:20px;background:transparent;border:1px solid var(--border);color:var(--muted);padding:9px 18px;border-radius:9px;cursor:pointer;font-size:0.82rem;font-weight:600;font-family:'DM Sans',sans-serif;transition:all 0.2s;z-index:10;}
    .skip-btn:hover{border-color:rgba(56,189,248,0.4);color:var(--accent);}
    .brand{position:fixed;top:20px;left:24px;display:flex;align-items:center;gap:9px;z-index:10;}
    .brand-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;}
    .brand-name{font-family:'Syne',sans-serif;font-weight:800;font-size:0.9rem;color:#fff;}
    .wrap{width:100%;max-width:520px;display:flex;flex-direction:column;gap:0;}
    /* Steps progress */
    .steps-bar{display:flex;align-items:center;gap:0;margin-bottom:28px;}
    .step-item{display:flex;align-items:center;gap:8px;flex:1;}
    .step-num{width:28px;height:28px;border-radius:50%;border:2px solid var(--border);background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:0.72rem;font-weight:700;color:var(--muted);transition:all 0.3s;flex-shrink:0;}
    .step-num.done{background:var(--accent3);border-color:var(--accent3);color:#fff;}
    .step-num.active{background:rgba(56,189,248,0.15);border-color:var(--accent);color:var(--accent);}
    .step-lbl{font-size:0.75rem;font-weight:600;color:var(--muted);transition:color 0.3s;}
    .step-lbl.active{color:var(--accent);}
    .step-lbl.done{color:var(--accent3);}
    .step-line{flex:1;height:1px;background:var(--border);margin:0 6px;transition:background 0.3s;}
    .step-line.done{background:var(--accent3);}
    /* Header */
    .header{text-align:center;margin-bottom:28px;}
    .header h1{font-family:'Syne',sans-serif;font-size:1.9rem;font-weight:800;color:#fff;margin-bottom:6px;}
    .header p{font-size:0.85rem;color:var(--muted);}
    /* Card */
    .card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:28px;transition:all 0.3s;}
    .hidden{display:none!important;}
    /* Form */
    .form-group{margin-bottom:16px;}
    .form-label{display:block;font-size:0.78rem;font-weight:600;color:var(--muted);margin-bottom:7px;letter-spacing:0.3px;}
    .form-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:11px 14px;color:var(--text);font-size:0.9rem;font-family:'DM Sans',sans-serif;transition:border-color 0.2s;}
    .form-input:focus{outline:none;border-color:rgba(56,189,248,0.45);background:rgba(56,189,248,0.02);}
    .form-input::placeholder{color:var(--muted);}
    /* Plans */
    .plans-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px;}
    .plan-card{background:var(--surface2);border:2px solid var(--border);border-radius:14px;padding:20px 14px;text-align:center;cursor:pointer;transition:all 0.25s;position:relative;overflow:hidden;}
    .plan-card:hover{border-color:rgba(56,189,248,0.3);transform:translateY(-2px);}
    .plan-card.selected{border-color:var(--accent);background:rgba(56,189,248,0.06);}
    .plan-card.popular{border-color:rgba(129,140,248,0.4);}
    .plan-card.popular.selected{border-color:var(--accent2);background:rgba(129,140,248,0.08);}
    .popular-tag{position:absolute;top:0;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,var(--accent2),var(--accent));color:#fff;font-size:0.62rem;font-weight:700;padding:3px 12px;border-radius:0 0 8px 8px;letter-spacing:0.5px;text-transform:uppercase;}
    .plan-name{font-family:'Syne',sans-serif;font-size:0.85rem;font-weight:700;color:var(--muted);margin-bottom:8px;margin-top:8px;}
    .plan-price{font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:800;color:#fff;line-height:1;}
    .plan-currency{font-size:1rem;vertical-align:super;margin-right:2px;color:var(--accent);}
    .plan-period{font-size:0.72rem;color:var(--muted);margin-top:4px;}
    /* QR */
    .qr-box{text-align:center;}
    .qr-img{width:200px;height:200px;border-radius:14px;border:2px solid var(--border);object-fit:contain;margin:0 auto 16px;display:block;}
    .qr-amount{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;color:#fff;margin-bottom:4px;}
    .qr-upi{font-size:0.8rem;color:var(--muted);}
    /* Status bar */
    .status-bar{margin-top:16px;text-align:center;font-size:0.83rem;font-weight:500;padding:10px 16px;border-radius:9px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);transition:all 0.3s;}
    .status-bar.ok{color:var(--accent3);background:rgba(52,211,153,0.06);border-color:rgba(52,211,153,0.2);}
    .status-bar.wait{color:var(--accent);background:rgba(56,189,248,0.06);border-color:rgba(56,189,248,0.2);}
    .status-bar.paid{color:var(--accent3);background:rgba(52,211,153,0.1);border-color:rgba(52,211,153,0.3);}
    /* Primary button */
    .btn-primary{width:100%;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;padding:13px 22px;border-radius:10px;font-size:0.9rem;font-weight:700;cursor:pointer;transition:all 0.2s;font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:16px;}
    .btn-primary:hover:not(:disabled){opacity:0.9;transform:translateY(-1px);box-shadow:0 8px 24px rgba(56,189,248,0.2);}
    .btn-primary:disabled{opacity:0.35;cursor:not-allowed;transform:none!important;}
    .timer-ring{display:inline-block;font-family:'Syne',sans-serif;font-weight:800;color:var(--accent);}
  </style>
</head>
<body>
  <div class="brand">
    <div class="brand-icon">💊</div>
    <div class="brand-name">SARS</div>
  </div>
  <button class="skip-btn" onclick="skipSubscription()">Skip →</button>

  <div class="wrap">
    <!-- Steps -->
    <div class="steps-bar" id="stepsBar">
      <div class="step-item">
        <div class="step-num active" id="s1">1</div>
        <div class="step-lbl active" id="sl1">Details</div>
      </div>
      <div class="step-line" id="line1"></div>
      <div class="step-item">
        <div class="step-num" id="s2">2</div>
        <div class="step-lbl" id="sl2">Plan</div>
      </div>
      <div class="step-line" id="line2"></div>
      <div class="step-item">
        <div class="step-num" id="s3">3</div>
        <div class="step-lbl" id="sl3">Pay</div>
      </div>
    </div>

    <div class="header">
      <h1>Choose Your Plan</h1>
      <p>Unlock unlimited AI-powered health recommendations</p>
    </div>

    <!-- STEP 1: Details -->
    <div class="card" id="step1">
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input id="userName" type="text" class="form-input" placeholder="Enter your full name">
      </div>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input id="userEmail" type="email" class="form-input" placeholder="Enter your email address">
      </div>
      <div class="form-group">
        <label class="form-label">Phone Number</label>
        <input id="phone" type="tel" class="form-input" placeholder="10-digit phone number" maxlength="10">
      </div>
      <button class="btn-primary" id="showPlans" onclick="showPlans()" disabled>Continue →</button>
      <div class="status-bar" id="status">Enter your details to continue</div>
    </div>

    <!-- STEP 2: Plans -->
    <div class="card hidden" id="plans">
      <div class="plans-grid">
        <div class="plan-card" data-amount="1" data-plan="weekly">
          <div class="plan-name">Weekly</div>
          <div class="plan-price"><span class="plan-currency">₹</span>1</div>
          <div class="plan-period">per week</div>
        </div>
        <div class="plan-card popular" data-amount="10" data-plan="monthly">
          <div class="popular-tag">Popular</div>
          <div class="plan-name">Monthly</div>
          <div class="plan-price"><span class="plan-currency">₹</span>10</div>
          <div class="plan-period">per month</div>
        </div>
        <div class="plan-card" data-amount="50" data-plan="yearly">
          <div class="plan-name">Yearly</div>
          <div class="plan-price"><span class="plan-currency">₹</span>50</div>
          <div class="plan-period">per year</div>
        </div>
      </div>
      <button class="btn-primary" id="showQR" onclick="showQR()" disabled>Pay ₹<span id="planAmount">0</span> — Show QR</button>
      <div class="status-bar" id="status2">Select a plan to continue</div>
    </div>

    <!-- STEP 3: QR Payment -->
    <div class="card hidden" id="paymentSection">
      <div class="qr-box">
        <div style="font-family:'Syne',sans-serif;font-size:0.78rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:16px;">Scan & Pay via UPI</div>
        <img id="qrCodeImg" src="universal_upi_qr.png" class="qr-img" alt="UPI QR Code">
        <div class="qr-amount" id="qrAmount">₹0</div>
        <div class="qr-upi" id="qrUpi"></div>
        <div class="status-bar wait" id="status3" style="margin-top:16px;">⏱ Waiting for payment…</div>
      </div>
    </div>
  </div>

  <script>
    const UPI_ID = "9398167985@ybl";
    const NAME = "SARS_ACCOUNT";
    let selectedAmount = null, selectedPlan = null;

    function setStep(n) {
      [1,2,3].forEach(i => {
        const sn = document.getElementById('s'+i), sl = document.getElementById('sl'+i);
        if(i < n) { sn.classList.add('done'); sn.classList.remove('active'); sn.textContent='✓'; sl.classList.add('done'); sl.classList.remove('active'); }
        else if(i === n) { sn.classList.add('active'); sn.classList.remove('done'); sn.textContent=i; sl.classList.add('active'); sl.classList.remove('done'); }
        else { sn.classList.remove('active','done'); sn.textContent=i; sl.classList.remove('active','done'); }
      });
      [1,2].forEach(i => {
        const line = document.getElementById('line'+i);
        if(i < n-1) line.classList.add('done'); else line.classList.remove('done');
      });
    }

    function validateInputs() {
      const phoneValid = /^\d{10}$/.test(document.getElementById('phone').value);
      const nameValid = document.getElementById('userName').value.trim().length > 0;
      const emailValid = /^\S+@\S+\.\S+$/.test(document.getElementById('userEmail').value.trim());
      const isValid = phoneValid && nameValid && emailValid;
      document.getElementById('showPlans').disabled = !isValid;
      const status = document.getElementById('status');
      if(isValid) { status.textContent = '✓ Ready to continue'; status.className = 'status-bar ok'; }
      else if(!nameValid) { status.textContent = 'Enter your full name'; status.className = 'status-bar'; }
      else if(!emailValid) { status.textContent = 'Enter a valid email'; status.className = 'status-bar'; }
      else { status.textContent = 'Enter 10-digit phone'; status.className = 'status-bar'; }
      sessionStorage.setItem('phone', document.getElementById('phone').value);
      sessionStorage.setItem('userName', document.getElementById('userName').value);
      sessionStorage.setItem('userEmail', document.getElementById('userEmail').value);
    }

    ['phone','userName','userEmail'].forEach(id => document.getElementById(id).addEventListener('input', validateInputs));

    function skipSubscription() {
      sessionStorage.setItem('isSubscribed','false');
      if(!sessionStorage.getItem('free_attempts')) sessionStorage.setItem('free_attempts','3');
      window.location.href = '/dashboard';
    }

    function showPlans() {
      document.getElementById('plans').classList.remove('hidden');
      document.getElementById('plans').scrollIntoView({behavior:'smooth',block:'nearest'});
      setStep(2);
      sessionStorage.setItem('step','plans');
    }

    document.querySelectorAll('.plan-card').forEach(card => {
      card.onclick = () => {
        document.querySelectorAll('.plan-card').forEach(c => c.classList.remove('selected'));
        card.classList.add('selected');
        selectedAmount = parseInt(card.dataset.amount);
        selectedPlan = card.dataset.plan;
        document.getElementById('showQR').disabled = false;
        document.getElementById('planAmount').textContent = selectedAmount;
        const s2 = document.getElementById('status2');
        s2.textContent = `${selectedPlan.charAt(0).toUpperCase()+selectedPlan.slice(1)} plan selected`;
        s2.className = 'status-bar ok';
        sessionStorage.setItem('selectedPlan', selectedPlan);
        sessionStorage.setItem('selectedAmount', selectedAmount);
      };
    });

    function showQR(isRestore = false) {
      if(!selectedAmount) return;
      const phone = document.getElementById('phone').value;
      const userName = document.getElementById('userName').value.trim();
      const userEmail = document.getElementById('userEmail').value.trim();
      if(!isRestore) {
        fetch('/store-sub',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:userName,email:userEmail,phone,plan:selectedPlan,amount:selectedAmount,status:'pending'})});
        sessionStorage.setItem('step','payment');
        sessionStorage.setItem('paymentTime', Date.now());
      }
      document.getElementById('paymentSection').classList.remove('hidden');
      document.getElementById('paymentSection').scrollIntoView({behavior:'smooth',block:'nearest'});
      document.getElementById('qrAmount').textContent = `₹${selectedAmount}`;
      document.getElementById('qrUpi').innerHTML = `To ${NAME} · ${UPI_ID}`;
      setStep(3);
      let timeLeft = 300;
      if(isRestore) { const pt = parseInt(sessionStorage.getItem('paymentTime')||Date.now()); timeLeft = Math.max(0, 300 - Math.floor((Date.now()-pt)/1000)); }
      const s3 = document.getElementById('status3');
      const timer = setInterval(() => {
        timeLeft--;
        s3.innerHTML = `⏱ Pay within <span class="timer-ring">${timeLeft}s</span> — Scan QR above`;
        if(timeLeft <= 0) { clearInterval(timer); s3.textContent = '⏰ Session expired'; s3.className = 'status-bar'; return; }
        if(timeLeft % 3 === 0) {
          fetch(`/check-status/${phone}`).then(r=>r.json()).then(d=>{
            if(d.paid) {
              clearInterval(timer);
              s3.textContent = '✅ Payment confirmed! Subscription active.';
              s3.className = 'status-bar paid';
              setTimeout(()=>{
                const uName=sessionStorage.getItem('userName');
                sessionStorage.clear();
                if(uName) sessionStorage.setItem('userName',uName);
                sessionStorage.setItem('isSubscribed','true');
                window.location.href='/dashboard';
              }, 2000);
            }
          });
        }
      }, 1000);
      document.getElementById('showQR').disabled = true;
      document.getElementById('showQR').innerHTML = '⏳ Waiting for payment…';
    }

    window.onload = () => {
      ['userName','userEmail','phone'].forEach(id => {
        const v = sessionStorage.getItem(id); if(v) document.getElementById(id).value = v;
      });
      if(sessionStorage.getItem('phone')) validateInputs();
      const step = sessionStorage.getItem('step');
      if(step === 'plans' || step === 'payment') {
        showPlans();
        const plan = sessionStorage.getItem('selectedPlan');
        if(plan) { const c=document.querySelector(`.plan-card[data-plan="${plan}"]`); if(c) c.click(); }
      }
      if(step === 'payment') showQR(true);
    };
  </script>
</body>
</html>
